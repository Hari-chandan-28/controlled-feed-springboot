# App
spring.application.name=controlled-feed-springboot

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/controlled_feed_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Security
spring.security.user.name=admin
spring.security.user.password=admin

# JWT
jwt.secret=MyUltraSecureJWTSecretKeyForProduction123456789
jwt.expiration=86400000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Upload directory
file.upload-dir=uploads/profile-pictures

