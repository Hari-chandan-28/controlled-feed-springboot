# App
spring.application.name=controlled-feed-springboot

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/controlled_feed_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Security
spring.security.user.name=admin
spring.security.user.password=admin

# JWT
jwt.secret=your_super_secret_key_make_it_long_at_least_32_characters
jwt.expiration=86400000